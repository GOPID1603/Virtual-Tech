<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Species Predictor - Advanced AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(45deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animated background elements */
        .circles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .circles li {
            position: absolute;
            display: block;
            list-style: none;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            animation: animate 25s linear infinite;
            bottom: -150px;
            border-radius: 50%;
        }

        .circles li:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .circles li:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .circles li:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .circles li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .circles li:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }

        @keyframes animate {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }

        /* Glassmorphism Container */
        .glass-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transform: translateY(20px);
            animation: floatUp 1s ease-out forwards;
        }

        @keyframes floatUp {
            to { transform: translateY(0); opacity: 1; }
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: -webkit-linear-gradient(#fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 0;
            font-size: 16px;
            color: #fff;
            margin-bottom: 30px;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.5);
            outline: none;
            background: transparent;
            transition: 0.3s ease;
        }

        .input-group input:focus {
            border-bottom: 2px solid #fff;
        }

        .input-group label {
            position: absolute;
            top: 0;
            left: 0;
            padding: 10px 0;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            pointer-events: none;
            transition: 0.5s;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -20px;
            left: 0;
            color: #fff;
            font-size: 12px;
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 75, 43, 0.6);
        }

        button:active {
            transform: scale(0.95);
        }

        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-size: 1.2em;
            font-weight: 600;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none;
        }

        .result.show {
            opacity: 1;
            transform: scale(1);
            display: block;
        }

        .success {
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid rgba(46, 204, 113, 0.5);
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.3);
        }

        .error {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid rgba(231, 76, 60, 0.5);
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
            position: relative;
        }
        
        .confidence-fill {
            height: 100%;
            background: #2ecc71;
            width: 0%;
            transition: width 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 40px;
            height: 40px;
            margin: 0 auto 20px auto;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <ul class="circles">
        <li></li><li></li><li></li><li></li><li></li>
    </ul>

    <div class="glass-container">
        <h2>🔮 AI Species Predictor</h2>
        <p style="text-align: center; margin-bottom: 30px; font-size: 0.9em; opacity: 0.8;">Enter petal & sepal measurements below</p>
        
        <form id="predictionForm">
            <div class="input-group">
                <input type="number" id="sepal_length" step="0.1" required>
                <label>Sepal Length (cm)</label>
            </div>
            
            <div class="input-group">
                <input type="number" id="sepal_width" step="0.1" required>
                <label>Sepal Width (cm)</label>
            </div>
            
            <div class="input-group">
                <input type="number" id="petal_length" step="0.1" required>
                <label>Petal Length (cm)</label>
            </div>
            
            <div class="input-group">
                <input type="number" id="petal_width" step="0.1" required>
                <label>Petal Width (cm)</label>
            </div>

            <button type="button" onclick="predictSpecies()">Predict Now ⚡</button>
        </form>

        <div class="spinner" id="loadingSpinner"></div>

        <div id="result" class="result">
            <span id="resultText"></span>
            <div class="confidence-bar" id="confBarContainer" style="display: none;">
                <div class="confidence-fill" id="confFill"></div>
            </div>
        </div>
    </div>

<script>
    async function predictSpecies() {
        const resultDiv = document.getElementById('result');
        const resultText = document.getElementById('resultText');
        const confBarContainer = document.getElementById('confBarContainer');
        const confFill = document.getElementById('confFill');
        const spinner = document.getElementById('loadingSpinner');
        const btn = document.querySelector('button');

        // Validation
        const sl = document.getElementById('sepal_length').value;
        const sw = document.getElementById('sepal_width').value;
        const pl = document.getElementById('petal_length').value;
        const pw = document.getElementById('petal_width').value;

        if(!sl || !sw || !pl || !pw) {
            alert("Please fill in all dimensions.");
            return;
        }

        // UI Reset
        resultDiv.classList.remove('show', 'success', 'error');
        confBarContainer.style.display = 'none';
        confFill.style.width = '0%';
        btn.style.display = 'none';
        spinner.style.display = 'block';

        const data = {
            sepal_length: parseFloat(sl),
            sepal_width: parseFloat(sw),
            petal_length: parseFloat(pl),
            petal_width: parseFloat(pw)
        };
        
        try {
            // Simulate slight delay for animation effect if local
            await new Promise(r => setTimeout(r, 600)); 

            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            spinner.style.display = 'none';
            btn.style.display = 'block';

            if (response.ok) {
                const confPercent = (result.confidence * 100).toFixed(1);
                resultText.innerHTML = `Identified: <span style="color:#ffeb3b;">${result.class_name.toUpperCase()}</span><br>
                                       <span style="font-size: 0.8em; opacity: 0.8;">Confidence: ${confPercent}%</span>`;
                resultDiv.className = 'result success show';
                confBarContainer.style.display = 'block';
                
                // Trigger animation reflow
                setTimeout(() => {
                    confFill.style.width = `${confPercent}%`;
                }, 100);

            } else {
                resultText.innerHTML = `❌ Error: ${result.error}`;
                resultDiv.className = 'result error show';
            }
            
        } catch (error) {
            spinner.style.display = 'none';
            btn.style.display = 'block';
            resultText.innerHTML = `⚠️ Network Error: ${error.message}`;
            resultDiv.className = 'result error show';
        }
    }
</script>

</body>
</html>
