<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Classification Web App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            background-color: #218838;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
            text-align: center;
            font-weight: bold;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Iris Classifier</h2>
    <p style="text-align: center; color: #777;">Enter flower measurements (cm)</p>
    
    <div class="form-group">
        <label for="sepal_length">Sepal Length</label>
        <input type="number" id="sepal_length" step="0.1" value="5.1" required>
    </div>
    <div class="form-group">
        <label for="sepal_width">Sepal Width</label>
        <input type="number" id="sepal_width" step="0.1" value="3.5" required>
    </div>
    <div class="form-group">
        <label for="petal_length">Petal Length</label>
        <input type="number" id="petal_length" step="0.1" value="1.4" required>
    </div>
    <div class="form-group">
        <label for="petal_width">Petal Width</label>
        <input type="number" id="petal_width" step="0.1" value="0.2" required>
    </div>
    
    <button onclick="predict()">Predict Iris Class</button>
    
    <div id="result"></div>
</div>

<script>
    async function predict() {
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'none';
        
        const data = {
            sepal_length: document.getElementById('sepal_length').value,
            sepal_width: document.getElementById('sepal_width').value,
            petal_length: document.getElementById('petal_length').value,
            petal_width: document.getElementById('petal_width').value
        };
        
        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            if (response.ok) {
                resultDiv.innerHTML = `Prediction: <b>${result.class_name}</b><br>
                                       <span style="font-size: 0.9em; color: #555;">Confidence: ${(result.confidence * 100).toFixed(2)}%</span>`;
                resultDiv.className = 'success';
            } else {
                resultDiv.innerHTML = `Error: ${result.error}`;
                resultDiv.className = 'error';
            }
            resultDiv.style.display = 'block';
            
        } catch (error) {
            resultDiv.innerHTML = `Network Error: ${error.message}`;
            resultDiv.className = 'error';
            resultDiv.style.display = 'block';
        }
    }
</script>

</body>
</html>
